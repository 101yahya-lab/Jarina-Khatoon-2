workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get
        
      - name: Configure Android Manifest
        script: |
          python3 - <<'PYEOF'
          import os
          path = "android/app/src/main/AndroidManifest.xml"
          
          if os.path.exists(path):
              with open(path, "r") as f:
                  content = f.read()

              # 1. Add Internet Permission
              if "android.permission.INTERNET" not in content:
                  content = content.replace("<manifest", '<manifest xmlns:tools="http://schemas.android.com/tools"')
                  content = content.replace(">", '>\n    <uses-permission android:name="android.permission.INTERNET" />', 1)

              # 2. Add Queries (Call/WhatsApp)
              queries_block = """
              <queries>
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <data android:scheme="https" />
                  </intent>
                  <intent>
                      <action android:name="android.intent.action.DIAL" />
                  </intent>
              </queries>
              """
              
              if "<queries>" not in content:
                  content = content.replace("<application", queries_block + "\n\n    <application")

              with open(path, "w") as f:
                  f.write(content)
              print("AndroidManifest successfully updated!")
          else:
              print("Error: AndroidManifest.xml file not found at " + path)
          PYEOF

      - name: Build APK
        script: flutter build apk --release
        
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
